<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pune Food Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }
    header {
      background: white;
      color: black;
      text-align: center;
      font-weight: bold;
      padding: 10px;
    }
    .food-card {
      height:400px ;
      background-size:cover;
      background-position:center;
      border-radius: 20px;
      position:relative;
      overflow: hidden;
      transform: transform 0.3s ease;
    }
    .food-card::before{
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, rgb(0,0,0,0.8),transparent);
    }
    .food-card:hover {
      transform:translate(0,-50px);
      cursor: pointer;
    }
  </style>
</head>

</header>

            <div class="food-card d-flex align-items-end justify-content-center pd-3" style="background-image:url(misal-pav.webp);">
              <h3 class="text-white fw-bold position-relative z-1">

              </h3>
            </div>
        </div>
        <div class="col-md-4">
