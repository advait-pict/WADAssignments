<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input[type="text"],
        input[type="password"],
        input[type="date"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .error {
            color: red;
            font-size: 12px;
            height: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #0056b3;
        }
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
            resize: none;
        }

    </style>
</head>
<body>

<div class="container">
<h2>Registration Form</h2>

<form onsubmit="handleSubmit(event)">

    Name:
    <input type="text" id="name" placeholder="First Middile Last">
    <div class="error" id="nameError"></div>

    Email:
    <input type="text" id="email" placeholder="abc@email.com">
    <div class="error" id="emailError"></div>

    Username:
    <input type="text" id="username" placeholder="Must be at least 4 characters">
    <div class="error" id="usernameError"></div>

    Phone Number:
    <input type="text" id="number" placeholder="10-digit number">
    <div class="error" id="numberError"></div>

    Gender:
    <br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other" checked> Other
    <div class="error" id="genderError"></div>

    Address:
    <textarea id="address" rows="3" placeholder="Enter your full address"></textarea>
    <div class="error" id="addressError"></div>


    Password:
    <input type="password" id="password">
    <input type="checkbox" onclick="togglePassword()"> Show Password
    <div class="error" id="passwordError"></div>

    Birthdate:
    <input type="date" id="birthdate">
    <div class="error" id="birthdateError"></div>

    <br>
    <button type="submit">Submit</button>

</form>
<h3 style="text-align:center; margin-top:18px;">Submissions</h3>
<ul id="submissionsList" style="list-style:none; padding:0 10px 20px 10px;
    max-width:400px; margin:0 auto 40px;">
    <!-- submissions inserted here -->
</ul>
</div>

<script>
    document.getElementById("birthdate").max =
        new Date().toISOString().split("T")[0];

    function togglePassword() {
        let pass = document.getElementById("password");
        pass.type = (pass.type === "password") ? "text" : "password";
    }

    function clearErrors() {
        let errors = document.getElementsByClassName("error");
        for (let i = 0; i < errors.length; i++) {
            errors[i].innerHTML = "";
        }
    }

    function validateForm() {
        clearErrors();
        let valid = true;

        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let username = document.getElementById("username").value.trim();
        let number = document.getElementById("number").value.trim();
        let password = document.getElementById("password").value;
        let birthdate = document.getElementById("birthdate").value;
        let gender = document.querySelector('input[name="gender"]:checked');

        let namepattern = /^[a-zA-Z]+( [a-zA-Z]+)*$/;
        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        let phonePattern1 = /^[6-9][0-9]{9}$/;
        let phonePattern2 = /^[0-9]{10}$/;

        if (name === "") {
            document.getElementById("nameError").innerHTML = "Name is required";
            valid = false;
        }else if(name.match(namepattern) === null){
            document.getElementById("nameError").innerHTML = "Name can only contain letters and single spaces between words";
            valid = false;
        }

        if (!email.match(emailPattern)) {
            document.getElementById("emailError").innerHTML = "Invalid email";
            valid = false;
        }

        if (username.length < 4) {
            document.getElementById("usernameError").innerHTML =
                "Username must be at least 4 characters";
            valid = false;
        }

        if (!number.match(phonePattern2)) {
            document.getElementById("numberError").innerHTML =
                "Enter valid 10-digit phone number";
            valid = false;
        }else if (!number.match(phonePattern1)) {
            document.getElementById("numberError").innerHTML =
                "Phone number must start with 6-9";
            valid = false;
        }

        if (!gender) {
            document.getElementById("genderError").innerHTML =
                "Please select gender";
            valid = false;
        }

        
        let passwordPattern = /^(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}$/;

        if (!password.match(passwordPattern)) {
            document.getElementById("passwordError").innerHTML =
                "Password must be 8+ chars, include 1 uppercase and 1 special character";
            valid = false;
        }

        
        if (birthdate === "") {
            document.getElementById("birthdateError").innerHTML = "Select birthdate";
            valid = false;
        } else {
            // Convert string to Date Object
            const birthDateObj = new Date(birthdate);
            const today = new Date();

            let age = today.getFullYear() - birthDateObj.getFullYear();
            const monthDifference = today.getMonth() - birthDateObj.getMonth();
            
            if (monthDifference < 0 || (monthDifference === 0 && today.getDate() < birthDateObj.getDate())) {
                age--;
            }

            if (age >= 65 || age < 18) {
                document.getElementById("birthdateError").innerHTML = "Age must be 65 or younger and more than 18";
                valid = false;
            }
        }

        let address = document.getElementById("address").value.trim();
        let lines = address.split("\n").filter(l => l.trim() !== "");

        if (lines.length < 2) {
            document.getElementById("addressError").innerHTML =
                "Address must contain at least 2 lines";
            valid = false;
        }


        return valid;
    }
    
        // LocalStorage helpers and AJAX POST (with fallback)
        function getStoredSubmissions() {
            try {
                return JSON.parse(localStorage.getItem('submissions') || '[]');
            } catch (e) {
                return [];
            }
        }

        function saveToLocalStorage(submission) {
            const list = getStoredSubmissions();
            list.unshift(submission);
            localStorage.setItem('submissions', JSON.stringify(list));
        }

        function renderSubmissions() {
            const list = getStoredSubmissions();
            const ul = document.getElementById('submissionsList');
            ul.innerHTML = '';
            if (list.length === 0) {
                ul.innerHTML = '<li style="color:#666; text-align:center;">No submissions yet</li>';
                return;
            }
            list.forEach(item => {
                const li = document.createElement('li');
                li.style.background = '#fff';
                li.style.border = '1px solid #e1e5ea';
                li.style.padding = '10px';
                li.style.marginBottom = '8px';
                li.style.borderRadius = '6px';
                li.innerHTML = `<strong>${escapeHtml(item.name)}</strong> — ${escapeHtml(item.email)}<br>
                    <small>${escapeHtml(item.username)} • ${escapeHtml(item.number)}</small><br>
                    <small>${escapeHtml(item.address).replace(/\n/g, '<br>')}</small>
                    <div style="margin-top:6px; font-size:11px; color:#666">Submitted: ${new Date(item._ts).toLocaleString()}</div>`;
                ul.appendChild(li);
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Simulate an AJAX POST: attempt XHR POST to current page, but always
        // persist to localStorage on success or failure (so it works without a server)
        function ajaxPost(data) {
            return new Promise((resolve) => {
                try {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', window.location.href, true);
                    xhr.setRequestHeader('Content-Type', 'application/json;charset=UTF-8');
                    xhr.onreadystatechange = function () {
                        if (xhr.readyState === 4) {
                            // treat any response as success for client-only storage
                            resolve({status: xhr.status, response: xhr.responseText});
                        }
                    };
                    xhr.onerror = function () {
                        // network/CORS errors will land here; still resolve so we can save locally
                        resolve({status: 0});
                    };
                    xhr.send(JSON.stringify(data));
                    // Safety timeout: if no network, still resolve after 1s
                    setTimeout(() => resolve({status: 0, timeout: true}), 1000);
                } catch (e) {
                    // if XHR construction fails (file://) just resolve
                    resolve({status: 0, error: e});
                }
            });
        }

        async function handleSubmit(event) {
            event.preventDefault();
            if (!validateForm()) return false;

            const data = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                username: document.getElementById('username').value.trim(),
                number: document.getElementById('number').value.trim(),
                gender: (document.querySelector('input[name="gender"]:checked') || {}).value || '',
                address: document.getElementById('address').value.trim(),
                birthdate: document.getElementById('birthdate').value,
                _ts: Date.now()
            };

            // Attempt AJAX POST (client-side); regardless of outcome, persist locally
            await ajaxPost(data);
            saveToLocalStorage(data);
            renderSubmissions();

            // clear form (but keep birthdate max intact)
            document.querySelector('form').reset();
            document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];
            return false;
        }

        // render on load
        document.addEventListener('DOMContentLoaded', renderSubmissions);

</script>

</body>
</html>
